{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
    <title>Результаты</title>
</head>
<body>

    <div class="container">
        <h2 style="color: #D4AF37; text-transform: uppercase; font-size: 16px; letter-spacing: 2px; text-align: center; display: block; width: 100%;">Results!</h2>
        
        <h1>{{ question.question_text }}</h1>

        <ul style="list-style: none; padding: 0; margin: 30px 0;">
            {% for choice in question.choice_set.all %}
                <li style="margin-bottom: 15px; font-size: 20px; color: whitesmoke; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px;">
                    <strong>{{ choice.choice_text }}</strong> — 
                    <span style="color: #D4AF37; font-weight: bold;">
                        {{ choice.votes }} {{ choice.votes|pluralize:"vote,votes" }}
                    </span>
                </li>
            {% endfor %}
        </ul>

        <a href="{% url 'polls:detail' question.id %}" class="submit-button" style="text-decoration: none; display: inline-block;">
            Vote again
        </a>
    </div>

</body>
</html>
