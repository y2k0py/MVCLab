{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
    <title>Głosowanie</title>
</head>
<body>
    <main class="container">
        <form class="vote-form" action="{% url 'polls:vote' question.id %}" method="post">
            {% csrf_token %}
            <fieldset>
                <legend>
                    <p class="eyebrow">Oddaj głos</p>
                    <h1>{{ question.question_text }}</h1>
                </legend>

                {% if error_message %}
                    <p class="error-message"><strong>{{ error_message }}</strong></p>
                {% endif %}

                <div class="choices">
                    {% for choice in question.choice_set.all %}
                        <label class="choice-card" for="choice{{ forloop.counter }}">
                            <input type="radio" name="choice" id="choice{{ forloop.counter }}" value="{{ choice.id }}">
                            <span>{{ choice.choice_text }}</span>
                        </label>
                    {% endfor %}
                </div>
            </fieldset>

            <div class="actions">
                <a class="secondary-button" href="{% url 'polls:index' %}">Wróć</a>
                <input class="submit-button" type="submit" value="Zagłosuj">
            </div>
        </form>
    </main>
</body>
</html>
